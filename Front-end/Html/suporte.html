<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusEdu - Player de Treinamento</title>
    <!-- Tailwind (opcional, para agilizar) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CSS customizado -->
    <link rel="stylesheet" href="suporte.css">
    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-layer-group"></i></div>
                Nexus<span>Edu</span>
            </div>
            <a href="index.html" class="btn">← Voltar</a>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="video-header">
                <h1 id="tituloSoftware">Carregando...</h1>
                <p id="subtituloSetor"></p>
            </div>

            <div class="video-grid">
                <!-- Player -->
                <div class="player-wrapper">
                    <div class="player-container">
                        <div id="loadingOverlay" class="loading-overlay">
                            <div class="spinner"></div>
                        </div>
                        <iframe id="youtubePlayer" class="player-iframe" src="" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                    </div>
                    <div class="video-description">
                        <h3 id="descricaoTitulo">Descrição da aula</h3>
                        <p id="descricaoTexto">Selecione uma aula na lista ao lado para começar.</p>
                    </div>
                </div>

                <!-- Lista de aulas -->
                <div class="playlist">
                    <h3>AULAS DISPONÍVEIS</h3>
                    <div id="listaAulas" class="playlist-items"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script>
    <script src="video.js"></script>
</body>
</html>
